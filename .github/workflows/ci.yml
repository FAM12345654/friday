name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt
            friday-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-test.txt -r friday-api/requirements.txt

      - name: Byte-compile sources
        run: python -m compileall -q friday friday-api

      - name: Run core tests
        run: python -m pytest friday/tests -q

      - name: Run API tests
        run: python -m pytest friday-api/tests -q
