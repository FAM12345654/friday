# Friday stack for Linux/macOS (and Windows via Docker Desktop).
#
#   docker compose up friday-api
#
# The API stores its local data under ./local_data (bind-mounted), matching
# the layout the native start scripts use.
services:
  friday-api:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "test $${#FRIDAY_API_TOKEN} -ge 32 ||
             (echo 'FRIDAY_API_TOKEN must contain at least 32 characters' >&2; exit 1);
             pip install --no-cache-dir -r friday-api/requirements.txt &&
             cd friday-api &&
             python -m uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - FRIDAY_API_TOKEN=${FRIDAY_API_TOKEN:?FRIDAY_API_TOKEN must be set for Docker}
    restart: unless-stopped
